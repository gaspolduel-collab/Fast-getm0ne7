<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tips Keuangan Sukses</title>
    <style>
        /* Tampilan halaman awal (Motivasi) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 600px;
            z-index: 1;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            font-style: italic;
            color: #555;
            margin-bottom: 30px;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: #219150;
        }

        /* --- TAMPILAN PRANK --- */
        #prank-screen {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hacked-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 5rem;
            font-weight: bold;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* Styling untuk foto hasil jepretan */
        #captured-photo {
            display: none;
            margin-top: 30px;
            width: 300px;
            border: 5px solid red;
            border-radius: 10px;
            box-shadow: 0 0 20px red;
        }

        /* Animasi Berkedip Hitam Putih */
        @keyframes flash {
            0% { background-color: black; color: white; }
            50% { background-color: white; color: red; }
            100% { background-color: black; color: white; }
        }

        /* Animasi Gemetar (Shake) */
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-2deg); }
            20% { transform: translate(-3px, 0px) rotate(2deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(2deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-2deg); }
            80% { transform: translate(-1px, -1px) rotate(2deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Class untuk mengaktifkan prank */
        .active-prank {
            display: flex !important;
            animation: flash 0.1s infinite, shake 0.1s infinite;
        }
    </style>
</head>
<body>

    <!-- Layar Utama -->
    <div class="container" id="main-content">
        <h1>Rahasia Kebebasan Finansial</h1>
        <p>"Jangan bekerja untuk uang, pelajari caranya agar uang yang bekerja keras untuk Anda. Kesuksesan finansial dimulai dari keputusan kecil hari ini."</p>
        <button id="prank-btn">mau mempelajari lebih lanjut? klik disini</button>
    </div>

    <!-- Layar Prank -->
    <div id="prank-screen">
        <h1 class="hacked-text">HACKED BY FRIP</h1>
        <!-- Gambar untuk menampilkan wajah korban -->
        <img id="captured-photo" alt="Wajah Anda" />
    </div>

    <!-- Elemen Kamera (Disembunyikan, hanya untuk proses sistem) -->
    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const btn = document.getElementById('prank-btn');
        const prankScreen = document.getElementById('prank-screen');
        const mainContent = document.getElementById('main-content');
        
        // Elemen kamera
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const photo = document.getElementById('captured-photo');

        // Fungsi Suara Bising
        function playAnnoyingSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
            
            // Efek suara naik turun cepat
            setInterval(() => {
                const freq = oscillator.frequency.value === 800 ? 1200 : 800;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            }, 100);

            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        // Fungsi Jepret Foto
        function takePhoto() {
            // Gambar frame video ke canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Ubah canvas menjadi URL gambar dan tampilkan
            const dataUrl = canvas.toDataURL('image/png');
            photo.src = dataUrl;
            photo.style.display = 'block'; // Tampilkan foto di layar prank
        }

        // Jalankan Prank Utama
        function startPrank() {
            // 1. Fullscreen
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();

            // 2. Sembunyikan konten asli, munculkan layar prank
            mainContent.style.display = 'none';
            prankScreen.classList.add('active-prank');

            // 3. Mainkan suara bising
            playAnnoyingSound();

            // 4. Jepret foto setelah 1 detik (agar ada jeda kamera fokus)
            setTimeout(takePhoto, 1000);
        }

        // Event Klik Tombol
        btn.addEventListener('click', async () => {
            // Minta izin kamera terlebih dahulu
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // Jika izin diberikan, tunggu kamera menyala sebentar (0.5 detik), lalu mulai prank
                setTimeout(startPrank, 500);

            } catch (err) {
                // Jika korban menolak izin kamera (Block), prank tetap berjalan tapi tanpa foto
                startPrank();
            }
        });
    </script>
</body>
</html>
